<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MyShop — Demo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site-header">
<div class="topbar">
<button id="menuBtn" class="hamburger" aria-label="Open menu">☰</button>
<a class="logo" href="#">MyShop</a>
<div class="search-wrap">
<input id="searchInput" type="search" placeholder="Search for products, brands and more" aria-label="Search">
<button id="searchBtn">🔍</button>
</div>
<div class="icons">
<button id="cartBtn" aria-label="Open cart">🛒 <span id="cartCount">0</span></button>
<button id="accountBtn">👤</button>
</div>
</div>


<nav id="mobileNav" class="mobile-nav hidden">
<a href="#">Home</a>
<a href="#categories">Categories</a>
<a href="#products">Products</a>
<a href="#deals">Deals</a>
</nav>
</header>


<main>
<section class="category-strip" id="categories">
<div class="category" tabindex="0">Electronics</div>
<div class="category" tabindex="0">Fashion</div>
<div class="category" tabindex="0">Home</div>
<div class="category" tabindex="0">Beauty</div>
<div class="category" tabindex="0">Toys</div>
<div class="category" tabindex="0">Grocery</div>
</section>


<section class="hero">
<div class="carousel" id="carousel">
<div class="slide active" style="background-image:url('https://source.unsplash.com/1600x600/?shopping')">
<div class="hero-content">
<h1>Big Sale — Up to 70% off</h1>
<p>Top brands, limited time offers.</p>
<a class="btn" href="#products">Shop Now</a>
</div>
</div>
<div class="slide" style="background-image:url('https://source.unsplash.com/1600x600/?electronics')">
<div class="hero-content">
</html>
